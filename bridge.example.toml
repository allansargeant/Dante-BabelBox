# Example bridge configuration. Copy to bridge.toml and edit for your rig.
#
# Built-in device kinds today:
#   "osc-x32"    Behringer X32/Wing-family sharing the X32 OSC dialect
#                (covers X32 and Midas M32/HD96) - ships as a loaded
#                plugin (crates/plugin-osc-x32), not compiled directly in
#   "osc-wing"   Behringer Wing's own OSC dialect (console's 8 built-in
#                LCL preamps only for now - see adapter-osc's wing.rs)
#   "ah-tcp"     Allen & Heath AHM-series Dante/AES67 processors
#   "dlive-tcp"  Allen & Heath dLive consoles/MixRacks (physical preamp
#                "socket" addressing, channel = socket number 1-128)
#   "yamaha-dm3" Yamaha DM3/DM3S (official OSC spec; channel = Local
#                Input Num 1-16; gain is coarse integer dB, 0-64 only)
#
# "ah-midi" (Qu/SQ) and "yamaha" (CL/QL/DM7, Rio/Tio) are not implemented
# yet - see the project task list for why. `kind` is an open string, not
# a fixed list - dropping a plugin `.so`/`.dylib`/`.dll` into the
# bridge's --plugins-dir (see README's "Plugin Architecture" section and
# docs/plugin-development-guide.md) registers additional kinds without
# needing this file's format, or this project, to change at all.
#
# The [[mapping]] entries below were written by hand. `preamp-bridge init
# --infer-mappings` can generate a first draft of these by observing live
# Dante audio routing instead - see the README's "Auto-generating
# bridge.toml" section for the caveat that comes with trusting them.

[[device]]
id = "ahm-rack"
kind = "ah-tcp"
address = "10.0.0.10"
port = 51325

[[device]]
id = "dlive-mixrack"
kind = "dlive-tcp"
address = "10.0.0.15"
port = 51325

[[device]]
id = "x32-monitors"
kind = "osc-x32"
address = "10.0.0.20"
port = 10023

[[device]]
id = "dm3-foh"
kind = "yamaha-dm3"
address = "10.0.0.25"
port = 49900

[[mapping]]
from = { device = "ahm-rack", channel = 3 }
to   = { device = "x32-monitors", channel = 7 }
bidirectional = true

[[mapping]]
from = { device = "dlive-mixrack", channel = 12 }
to   = { device = "x32-monitors", channel = 8 }
bidirectional = true

[[mapping]]
from = { device = "dlive-mixrack", channel = 20 }
to   = { device = "dm3-foh", channel = 5 }
bidirectional = true
